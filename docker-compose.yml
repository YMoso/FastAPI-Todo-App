services:
  web:
    build: .
    container_name: fastapi_todo_web
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/todo_db
    depends_on:
      - db
    volumes:
      - .:/app

  db:
    image: postgres:16
    container_name: fastapi_todo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: